<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ERP Dashboard{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        :root {
            --primary: #1a237e;
            --primary-light: #3949ab;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --info: #2196f3;
            --sidebar-w: 230px;
        }

        body { background: #f0f2f5; display: flex; min-height: 100vh; }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--primary);
            min-height: 100vh;
            position: fixed;
            top: 0; left: 0;
            display: flex; flex-direction: column;
            z-index: 200;
        }
        .sidebar-brand {
            padding: 20px 18px;
            color: white;
            font-size: 17px; font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }
        .sidebar-brand small { display: block; font-size: 11px; opacity: .65; font-weight: 400; margin-top: 3px; }
        .sidebar-nav { padding: 12px 0; flex: 1; }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 18px;
            color: rgba(255,255,255,.78);
            text-decoration: none; font-size: 14px;
            border-left: 3px solid transparent;
            transition: all .15s;
        }
        .sidebar-nav a:hover { background: rgba(255,255,255,.1); color: white; }
        .sidebar-nav a.active {
            background: rgba(255,255,255,.16);
            color: white; font-weight: 600;
            border-left-color: #fff;
        }
        .sidebar-footer {
            padding: 14px 18px;
            border-top: 1px solid rgba(255,255,255,.12);
        }
        .sidebar-footer a {
            color: rgba(255,255,255,.65); text-decoration: none;
            font-size: 13px; display: block; padding: 5px 0;
        }
        .sidebar-footer a:hover { color: white; }

        /* ── Main ── */
        .main { margin-left: var(--sidebar-w); flex: 1; padding: 22px; min-width: 0; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 16px 22px;
            border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,.07);
            margin-bottom: 20px;
        }
        .page-header h1 { color: var(--primary); font-size: 21px; }
        .page-header .date { color: #888; font-size: 13px; }

        /* ── KPI cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 14px; margin-bottom: 20px;
        }
        .stat-card {
            background: white; padding: 18px 20px;
            border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,.07);
            border-top: 3px solid var(--primary);
            transition: transform .2s;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 5px 14px rgba(0,0,0,.11); }
        .stat-card.success { border-top-color: var(--success); }
        .stat-card.warning { border-top-color: var(--warning); }
        .stat-card.danger  { border-top-color: var(--danger); }
        .stat-card.info    { border-top-color: var(--info); }
        .stat-card h3 { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 7px; }
        .stat-number { font-size: 26px; font-weight: 700; color: var(--primary); margin-bottom: 3px; }
        .stat-card.success .stat-number { color: var(--success); }
        .stat-card.warning .stat-number { color: var(--warning); }
        .stat-card.danger  .stat-number { color: var(--danger); }
        .stat-card.info    .stat-number { color: var(--info); }
        .stat-sub { color: #aaa; font-size: 12px; }

        /* ── Alert strip ── */
        .alert-strip {
            display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
        }
        .alert-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
        }
        .alert-pill.red    { background: #ffebee; color: #c62828; }
        .alert-pill.orange { background: #fff3e0; color: #e65100; }
        .alert-pill.green  { background: #e8f5e9; color: #2e7d32; }
        .alert-pill.blue   { background: #e3f2fd; color: #1565c0; }

        /* ── Charts ── */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(370px, 1fr));
            gap: 14px; margin-bottom: 20px;
        }
        .chart-card {
            background: white; padding: 18px 20px;
            border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,.07);
        }
        .chart-card h3 { color: var(--primary); margin-bottom: 14px; font-size: 15px; }
        .chart-container { height: 250px; position: relative; }

        /* ── Tables ── */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 14px; margin-bottom: 20px;
        }
        .table-card {
            background: white; padding: 18px 20px;
            border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,.07);
        }
        .table-card h3 { color: var(--primary); margin-bottom: 12px; font-size: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 9px 11px;
            background: #f5f5f5; color: #555;
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: .4px;
        }
        td { padding: 8px 11px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }
        .no-data { text-align: center; color: #bbb; padding: 18px; font-size: 13px; }

        .amount { font-weight: 600; color: var(--primary); }
        .amount.pos { color: var(--success); }
        .amount.neg { color: var(--danger); }

        .section-title {
            font-size: 16px; color: var(--primary);
            margin: 22px 0 12px; padding-bottom: 7px;
            border-bottom: 2px solid #e8eaf6;
        }

        /* ── Badges ── */
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
        .badge-success  { background: #e8f5e9; color: #2e7d32; }
        .badge-warning  { background: #fff3e0; color: #e65100; }
        .badge-danger   { background: #ffebee; color: #c62828; }
        .badge-info     { background: #e3f2fd; color: #1565c0; }
        .badge-secondary{ background: #f5f5f5; color: #616161; }

        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .main { margin-left: 0; }
            .charts-grid, .tables-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        📊 ERP System
        <small>Management Suite</small>
    </div>
    <nav class="sidebar-nav">
        {% for item in nav %}
        <a href="{% url item.url_name %}" {% if item.active %}class="active"{% endif %}>
            <span>{{ item.icon }}</span>{{ item.name }}
        </a>
        {% endfor %}
    </nav>
    <div class="sidebar-footer">
        <a href="/admin/">⚙️ Admin Panel</a>
        <a href="/admin/logout/">🚪 Log Out</a>
    </div>
</aside>

<main class="main">
    <div class="page-header">
        <h1>{% block page_title %}Dashboard{% endblock %}</h1>
        <div class="date">{{ today|date:"l, F j, Y" }}</div>
    </div>

    {% block content %}{% endblock %}
</main>

<script>
{% block scripts %}{% endblock %}
</script>
</body>
</html>
