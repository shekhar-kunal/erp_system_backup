<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signed Out — ERP System</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1629 0%, #1e2a5e 50%, #0f1629 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 48px 44px;
      max-width: 380px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p  { color: rgba(255,255,255,0.65); font-size: 14px; margin-bottom: 28px; }
    a  {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #1e2a5e, #3d5af1);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 4px 14px rgba(61,90,241,0.4);
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You have been signed out</h1>
    <p>Your session has ended securely.</p>
    <a href="/login/">Sign In Again</a>
  </div>
</body>
</html>
